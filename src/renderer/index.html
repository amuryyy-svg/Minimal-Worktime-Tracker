<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Work Tracker</title>
    <link rel="icon" type="image/png" sizes="any" href="../../Logo.png" />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="window-shell">
      <header class="titlebar">
        <div class="brand">
          <span class="brand-mark" aria-hidden="true"></span>
          <span class="brand-label">Work tracker</span>
        </div>
        <div class="window-actions no-drag">
          <button id="window-settings" class="window-btn" type="button" aria-label="Настройки">
            <svg viewBox="0 0 16 16" aria-hidden="true">
              <path d="M8 1.75V3.25M8 12.75V14.25M1.75 8H3.25M12.75 8H14.25M3.14 3.14L4.2 4.2M11.8 11.8L12.86 12.86M11.8 4.2L12.86 3.14M3.14 12.86L4.2 11.8M8 5.4A2.6 2.6 0 1 1 8 10.6A2.6 2.6 0 0 1 8 5.4Z" />
            </svg>
          </button>
          <button id="window-minimize" class="window-btn" type="button" aria-label="Свернуть">
            <svg viewBox="0 0 16 16" aria-hidden="true">
              <path d="M3 8H13" />
            </svg>
          </button>
          <button id="window-close" class="window-btn" type="button" aria-label="Закрыть">
            <svg viewBox="0 0 16 16" aria-hidden="true">
              <path d="M4 4L12 12" />
              <path d="M12 4L4 12" />
            </svg>
          </button>
        </div>
      </header>

      <main class="app">
        <section class="dashboard">
          <section class="info-strip" aria-label="Состояние трекера">
            <div id="status-badge" class="info-cell status-cell">Остановлено</div>
            <div id="streak-value" class="info-cell streak-cell">0 дней подряд</div>
            <label class="info-cell target-cell no-drag" for="daily-target-hours">
              <span class="target-label">Цель</span>
              <input
                id="daily-target-hours"
                class="target-input"
                type="number"
                min="1"
                max="24"
                step="1"
                inputmode="numeric"
                aria-label="Дневная норма в часах"
                value="6"
              />
              <span class="target-unit">ч</span>
            </label>
          </section>
          <section
            id="timer-panel"
            class="timer-panel"
            tabindex="0"
            role="button"
            aria-pressed="false"
            aria-label="Запустить или остановить таймер"
          >
            <div class="timer-face">
              <p id="timer-display" class="timer-display">00:00:00</p>
            </div>
          </section>

          <section class="calendar-panel">
            <div class="calendar-header">
              <button id="prev-month" class="nav-btn" type="button" aria-label="Предыдущий месяц">
                <svg viewBox="0 0 16 16" aria-hidden="true">
                  <path d="M10 3L5 8L10 13" />
                </svg>
              </button>
              <h1 id="calendar-title">Март 2026</h1>
              <button id="next-month" class="nav-btn" type="button" aria-label="Следующий месяц">
                <svg viewBox="0 0 16 16" aria-hidden="true">
                  <path d="M6 3L11 8L6 13" />
                </svg>
              </button>
            </div>

            <div id="weekend-toggle" class="weekend-strip" aria-label="Регулярные выходные"></div>
            <div id="calendar-grid" class="calendar-grid" aria-label="Календарь"></div>
          </section>

          <section id="selected-day-panel" class="selection-strip" aria-label="Выбранная дата">
            <div class="selection-main">
              <p id="selected-day-label" class="selection-day">23 марта</p>
              <p id="selected-day-meta" class="selection-meta">0 ч</p>
            </div>
            <div class="selection-actions">
              <button id="toggle-day-off" class="selection-btn" type="button">Выходной</button>
              <button id="clear-day" class="selection-btn" type="button">Очистить день</button>
              <button id="import-backup" class="selection-btn" type="button">Импорт</button>
              <button id="export-backup" class="selection-btn" type="button">Экспорт</button>
            </div>
          </section>
        </section>
      </main>

      <div id="app-toast" class="app-toast" role="status" aria-live="polite" hidden></div>

      <div id="settings-overlay" class="settings-overlay" hidden>
        <button id="settings-backdrop" class="settings-backdrop" type="button" aria-label="&#1047;&#1072;&#1082;&#1088;&#1099;&#1090;&#1100; &#1085;&#1072;&#1089;&#1090;&#1088;&#1086;&#1081;&#1082;&#1080;"></button>
        <section class="settings-panel" role="dialog" aria-modal="true" aria-labelledby="settings-title">
          <header class="settings-header">
            <h2 id="settings-title">&#1053;&#1072;&#1089;&#1090;&#1088;&#1086;&#1081;&#1082;&#1080;</h2>
            <button id="settings-close" class="window-btn settings-close" type="button" aria-label="&#1047;&#1072;&#1082;&#1088;&#1099;&#1090;&#1100; &#1085;&#1072;&#1089;&#1090;&#1088;&#1086;&#1081;&#1082;&#1080;">
              <svg viewBox="0 0 16 16" aria-hidden="true">
                <path d="M4 4L12 12" />
                <path d="M12 4L4 12" />
              </svg>
            </button>
          </header>

          <div class="settings-body">
            <section class="settings-section">
              <p id="settings-language-label" class="settings-label">Language</p>
              <div class="settings-toggle" role="radiogroup" aria-labelledby="settings-language-label">
                <button id="settings-language-ru" class="settings-option" type="button" aria-pressed="true">Russian</button>
                <button id="settings-language-en" class="settings-option" type="button" aria-pressed="false">English</button>
              </div>
            </section>

            <section class="settings-section">
              <p id="settings-date-format-label" class="settings-label">Date format</p>
              <div class="settings-toggle settings-toggle--triple" role="radiogroup" aria-labelledby="settings-date-format-label">
                <button id="settings-date-format-localized" class="settings-option" type="button" aria-pressed="true">Localized</button>
                <button id="settings-date-format-dmy" class="settings-option" type="button" aria-pressed="false">DD.MM.YYYY</button>
                <button id="settings-date-format-mdy" class="settings-option" type="button" aria-pressed="false">MM/DD/YYYY</button>
              </div>
            </section>

            <section class="settings-section">
              <p id="settings-week-start-label" class="settings-label">Week start</p>
              <div class="settings-toggle" role="radiogroup" aria-labelledby="settings-week-start-label">
                <button id="settings-week-start-monday" class="settings-option" type="button" aria-pressed="true">Monday</button>
                <button id="settings-week-start-sunday" class="settings-option" type="button" aria-pressed="false">Sunday</button>
              </div>
            </section>

            <section class="settings-section">
              <p id="settings-autostart-label" class="settings-label">Autostart</p>
              <div class="settings-toggle" role="radiogroup" aria-labelledby="settings-autostart-label">
                <button id="settings-autostart-off" class="settings-option" type="button" aria-pressed="true">Off</button>
                <button id="settings-autostart-on" class="settings-option" type="button" aria-pressed="false">On</button>
              </div>
            </section>

            <section class="settings-section">
              <p id="settings-auto-backup-label" class="settings-label">Auto backup</p>
              <div class="settings-toggle" role="radiogroup" aria-labelledby="settings-auto-backup-label">
                <button id="settings-auto-backup-off" class="settings-option" type="button" aria-pressed="true">Off</button>
                <button id="settings-auto-backup-on" class="settings-option" type="button" aria-pressed="false">On</button>
              </div>
            </section>

            <section class="settings-section">
              <p id="settings-data-label" class="settings-label">Data</p>
              <div class="settings-toggle settings-toggle--single" role="group" aria-labelledby="settings-data-label">
                <button id="settings-clear-data" class="settings-option" type="button">Clear data</button>
              </div>
            </section>
          </div>
        </section>
      </div>

      <div id="confirm-overlay" class="settings-overlay confirm-overlay" hidden>
        <button id="confirm-backdrop" class="settings-backdrop" type="button" aria-label="Cancel confirmation"></button>
        <section class="settings-panel confirm-panel" role="dialog" aria-modal="true" aria-labelledby="confirm-title" aria-describedby="confirm-message">
          <header class="settings-header">
            <h2 id="confirm-title">Confirm action</h2>
            <button id="confirm-close" class="window-btn settings-close" type="button" aria-label="Cancel confirmation">
              <svg viewBox="0 0 16 16" aria-hidden="true">
                <path d="M4 4L12 12" />
                <path d="M12 4L4 12" />
              </svg>
            </button>
          </header>

          <div class="settings-body confirm-body">
            <p id="confirm-message" class="confirm-message"></p>
            <div class="settings-toggle confirm-actions" role="group" aria-labelledby="confirm-title">
              <button id="confirm-cancel" class="settings-option confirm-action" type="button">Cancel</button>
              <button id="confirm-accept" class="settings-option confirm-action confirm-action--primary" type="button">Confirm</button>
            </div>
          </div>
        </section>
      </div>

    <script src="./tracker-core.js"></script>
    <script src="./tracker-storage.js"></script>
    <script src="./tracker-timer.js"></script>
    <script src="./app.js"></script>
  </body>
</html>
